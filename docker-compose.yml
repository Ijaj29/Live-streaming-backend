services:
  mysql:
    image: mysql:8.0
    container_name: live_streaming_db
    environment:
      MYSQL_ROOT_PASSWORD: Ijaj.jaman@29
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: live_streaming
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: |
      --default-authentication-plugin=mysql_native_password
      --bind-address=0.0.0.0
      --skip-host-cache
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 3s

volumes:
  mysql_data:
